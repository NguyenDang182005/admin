server.port=8082
spring.application.name=admin

# ===============================
# 1. DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://127.0.0.1:6666/booking_db?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# 2. JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# 3. FILE STORAGE CONFIGURATION
# ===============================
file.upload-dir=uploads/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# ===============================
# 4. JWT CONFIGURATION
# ===============================
jwt.secret=mySecretKeyForAdminPanelJWT2024SecureTokenGeneration
jwt.expiration=86400000

# ===============================
# 5. MONITORING / JMX CONFIGURATION
# ===============================
spring.jmx.enabled=true
management.endpoints.web.exposure.include=*
management.endpoints.jmx.exposure.include=*

# ===============================
# 6. LOGGING CONFIGURATION
# ===============================
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.example.demo.security=TRACE